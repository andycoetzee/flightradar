; =============================================================================
;  FlightRadar - PlatformIO build for the Waveshare ESP32-S3-Touch-LCD-7 (N16R8)
; -----------------------------------------------------------------------------
;  Why PlatformIO? The RGB panel's frame "roll" is PSRAM-bus starvation, and the
;  documented cures are ESP-IDF *sdkconfig* options that the stock Arduino IDE
;  cannot set (its libs are precompiled). The pioarduino platform's "hybrid
;  compile" rebuilds the framework with the options in `custom_sdkconfig` below
;  while still letting us use the ordinary Arduino API - so the sketch code is
;  unchanged.
;
;  This config compiles the existing FlightRadar.ino IN PLACE (src_dir = .), so
;  the Arduino IDE layout is preserved and you can still open/flash from the IDE
;  if you ever need to. It also reuses your existing Arduino libraries (including
;  the locally-patched GFX_Library_for_Arduino) via lib_extra_dirs.
;
;  First build: `pio run` (downloads the platform + rebuilds libs - slow once).
;  Flash + monitor: `pio run -t upload -t monitor`.
; =============================================================================

[platformio]
src_dir = .                       ; build FlightRadar.ino where it already lives

[env:waveshare_s3_lcd7]
; pioarduino platform (Arduino core 3.x / IDF 5.x) with hybrid-compile support.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino

; N16R8 board profile: 120 MHz QIO flash + 120 MHz OPI PSRAM. The extra PSRAM
; bandwidth is what lets the LCD run at its native 16 MHz clock without starving.
board = esp32s3_120_16_8-qio_opi

; Reuse the existing custom partition table (OTA app0/app1 + a "spiffs" data
; partition so LittleFS mounts and the coastline cache persists).
board_build.partitions = partitions.csv
board_build.filesystem  = littlefs

; Compile the sketch (PIO converts FlightRadar.ino -> .cpp) but exclude the junk
; dirs that live under the project root, since src_dir = . Without these excludes
; PIO would try to build the IDF build/ folder, the vendored libs, etc.
build_src_filter = +<*> -<build/> -<.pio/> -<managed_components/> -<lib/> -<_empty_tmp/>

monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder

build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1     ; Serial debug over the native USB-C port
  -DARDUINO_USB_MODE=1
  ; Quiet harmless API-deprecation noise: LovyanGFX's numeric-font drawString/
  ; drawNumber overloads (still work fine; the IFont migration is cosmetic only).
  -Wno-deprecated-declarations

; Drop ESP-IDF managed components that arduino-esp32 pulls in by default but this
; project never uses. esp_insights/esp_rainmaker embed server certs (https_server.crt,
; rmaker_*.crt) that aren't present here and break the hybrid build; the rest (sr,
; zigbee, dsp, camera, modbus, modem, mp3, ...) are just dead weight that bloated the
; build and produced hundreds of warnings. NOTE: keep mdns (we use ESPmDNS) and
; littlefs (coastline cache).
custom_component_remove =
  espressif/esp_hosted
  espressif/esp_wifi_remote
  espressif/network_provisioning
  espressif/esp-dsp
  espressif/esp-sr
  espressif/esp_modem
  espressif/esp32-camera
  espressif/libsodium
  espressif/esp-modbus
  espressif/qrcode
  espressif/esp_insights
  espressif/esp_diag_data_store
  espressif/esp_diagnostics
  espressif/cbor
  espressif/esp_rainmaker
  espressif/rmaker_common
  espressif/esp-zigbee-lib
  espressif/esp-zboss-lib
  chmorgan/esp-libhelix-mp3

; --- The actual fix: IDF options the Arduino IDE can't reach -----------------
;  RESTART_IN_VSYNC      auto re-syncs the LCD DMA every frame -> a momentary
;                        blip at worst instead of a permanent roll.
;  SPIRAM XIP (+FETCH/   run code & const data from PSRAM so the cache stays
;  RODATA)               enabled and the LCD isn't starved (also lets the screen
;                        keep working during flash writes / OTA).
;  *_IRAM_SAFE / GDMA    keep the DMA + LCD ISRs in IRAM so bounce-buffer refills
;                        aren't delayed by flash access.
;  DATA_CACHE 64KB/64B   larger/wider data cache = fewer PSRAM cache misses.
custom_sdkconfig =
  ; This board has OCTAL (OPI) PSRAM. In hybrid compile the board's qio_opi
  ; memory_type is bypassed and IDF defaults to QUAD mode, which makes PSRAM init
  ; fail at boot ("quad_psram: chip not connected, or wrong line mode") and the
  ; RGB frame-buffer alloc abort. Force octal at 80 MHz.
  ;
  ; NOTE: 120 MHz was tried (CONFIG_ESPTOOLPY_FLASHFREQ_120M + CONFIG_SPIRAM_SPEED_120M
  ; + CONFIG_IDF_EXPERIMENTAL_FEATURES + CONFIG_BOOTLOADER_FLASH_DC_AWARE) but IDF's
  ; Kconfig rejected the 120 MHz choice (unmet gating deps) and silently resolved both
  ; flash and PSRAM back to 80 MHz - i.e. it can't be enabled on this hybrid build. It
  ; isn't needed anyway: the roll fix is the RGB/DMA/XIP sdkconfig below, not raw clock.
  CONFIG_SPIRAM_MODE_OCT=y
  CONFIG_SPIRAM_SPEED_80M=y
  CONFIG_LCD_RGB_RESTART_IN_VSYNC=y
  CONFIG_LCD_RGB_ISR_IRAM_SAFE=y
  CONFIG_GDMA_CTRL_FUNC_IN_IRAM=y
  CONFIG_GDMA_ISR_IRAM_SAFE=y
  CONFIG_SPIRAM_XIP_FROM_PSRAM=y
  CONFIG_SPIRAM_FETCH_INSTRUCTIONS=y
  CONFIG_SPIRAM_RODATA=y
  CONFIG_ESP32S3_DATA_CACHE_64KB=y
  CONFIG_ESP32S3_DATA_CACHE_LINE_64B=y

; Libraries are vendored into ./lib (Arduino_GFX [patched with getPanelHandle],
; LovyanGFX, ArduinoJson) so PIO uses exactly these and never scans the global
; C:/Arduino/libraries folder - scanning it pulled in unrelated libraries (one
; embeds https_server.crt) and broke the build. Everything else (WiFi, WebServer,
; LittleFS, Update, Preferences, Wire, ...) comes from the framework itself.
